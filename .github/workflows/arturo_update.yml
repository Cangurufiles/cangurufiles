name: Arturo Engine Autopilot

on:
  schedule:
    # Gira alle 07:00 UTC (9:00 del mattino in Italia)
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Forza i permessi di scrittura

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Versione aggiornata

    - name: Setup Python
      uses: actions/setup-python@v5 # Versione aggiornata
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install yfinance requests

    - name: Run Arturo Engine
      run: python arturo_engine.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Arturo-Bot"
        git config --global user.email "arturo@canguru.lab"
        git pull --rebase # Fondamentale: scarica le tue modifiche manuali prima di caricare le sue
        git add .
        git commit -m "Aggiornamento automatico [Skip CI]" || exit 0
        git push
        
