name: Arturo_Autopilot

on:
  workflow_dispatch:
   schedule:
    # 07:00 UTC corrispondono alle 09:00 italiane (ora legale)
    - cron: '0 7 * * *'

jobs:
  run_arturo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install yfinance requests pandas lxml
      - name: Engine
        run: python arturo_engine.py
      - name: Save
        run: |
          git config --global user.name "ArturoBot"
          git config --global user.email "bot@canguru.lab"
          git add .
          git commit -m "Aggiornamento" || echo "No changes"
          git push
