<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CanGuru - Dashboard Audit Carburanti</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        .container { width: 95%; max-width: 1200px; margin: auto; }
        .nav-bar { text-align: center; margin-bottom: 20px; }
        .btn { padding: 12px 25px; background: #e74c3c; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; border: 2px solid #c0392b; display: inline-block; }
        .chart-box { background: #2d2d2d; padding: 15px; border-radius: 10px; margin-bottom: 20px; position: relative; height: 320px; border: 1px solid #444; }
        h2, h3 { text-align: center; color: #f1c40f; margin: 10px 0; text-transform: uppercase; font-size: 1.1rem; }

        /* STILE TABELLA */
        .table-container { margin-top: 30px; overflow-x: auto; background: #2d2d2d; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        table { width: 100%; border-collapse: collapse; color: #cfcfd8; font-size: 0.9rem; }
        th { background: #252529; color: #00ff41; padding: 12px; text-align: left; border-bottom: 2px solid #444; }
        td { padding: 10px; border-bottom: 1px solid #3d3d3d; }
        tr:hover { background: #35353a; }
        .footer-info { text-align: center; color: #666; font-size: 0.8rem; margin-top: 20px; padding-bottom: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="bilancio_sdr.html" class="btn">VAI AL RAPPORTO DETTAGLIATO SDR →</a>
    </div>

    <h2>Monitoraggio S.D.R. (Prezzi alla Pompa)</h2>
    <div class="chart-box">
        <canvas id="chartPompaEquo"></canvas>
    </div>

    <h3>Mercato Internazionale (Petrolio Brent)</h3>
    <div class="chart-box">
        <canvas id="chartBrent"></canvas>
    </div>

    <h3>Registro Analitico Dati</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Brent ($/b)</th>
                    <th>Cambio (€/$)</th>
                    <th>Pompa Reale (€)</th>
                    <th>Obiettivo Arturo (€)</th>
                </tr>
            </thead>
            <tbody id="tabellaDati">
                </tbody>
        </table>
    </div>

    <div class="footer-info">
        Sistema di Audit CanGuru - Davide & Arturo Lab.
    </div>
</div>

<script>
    // --- ARTURO SCRIVE QUI SOTTO ---
    const DATABASE_STORICO = [{"data": "2026-04-22", "brent": 105.4, "cambio": 1.172, "mimitDiesel": 1.835, "mimitBenzina": 1.925}, {"data": "2026-04-23", "brent": 106.8, "cambio": 1.17, "mimitDiesel": 1.84, "mimitBenzina": 1.93}, {"data": "2026-04-24", "brent": 99.78, "cambio": 1.1726, "mimitDiesel": 2.01, "mimitBenzina": 2.08}];

    const labels = DATABASE_STORICO.map(item => item.data);

    // Funzione per calcolare il Prezzo Equo (stessa formula del grafico)
    function calcolaEquo(brent, cambio) {
        return ((brent / cambio) * 0.0075 + 1.15).toFixed(3);
    }

    // RIEMPIMENTO TABELLA
    const corpoTabella = document.getElementById('tabellaDati');
    DATABASE_STORICO.slice().reverse().forEach(item => {
        const riga = `<tr>
            <td>${item.data}</td>
            <td>${item.brent.toFixed(2)}</td>
            <td>${item.cambio.toFixed(4)}</td>
            <td style="color:#e74c3c; font-weight:bold;">${item.mimitDiesel.toFixed(3)}</td>
            <td style="color:#2ecc71; font-weight:bold;">${calcolaEquo(item.brent, item.cambio)}</td>
        </tr>`;
        corpoTabella.innerHTML += riga;
    });

    // CONFIGURAZIONE GRAFICI (identica a prima)
    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc' } } },
        scales: {
            y: { ticks: { color: '#888' }, grid: { color: '#3d3d3d' } },
            x: { ticks: { color: '#888' }, grid: { color: '#3d3d3d' } }
        }
    };

    new Chart(document.getElementById('chartPompaEquo'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Pompa Reale', data: DATABASE_STORICO.map(item => item.mimitDiesel), borderColor: '#e74c3c', borderWidth: 3, tension: 0.2 },
                { label: 'Obiettivo Arturo', data: DATABASE_STORICO.map(item => calcolaEquo(item.brent, item.cambio)), borderColor: '#2ecc71', borderDash: [5, 5], fill: false }
            ]
        },
        options: commonOptions
    });

    new Chart(document.getElementById('chartBrent'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ label: 'Brent ($)', data: DATABASE_STORICO.map(item => item.brent), borderColor: '#f39c12', backgroundColor: 'rgba(243, 156, 18, 0.1)', fill: true, tension: 0.3 }]
        },
        options: commonOptions
    });
</script>
</body>
</html>
